<svg xmlns="http://www.w3.org/2000/svg" width="800" height="400" viewBox="0 0 800 400">
  <rect width="800" height="400" fill="#f4f2ed" rx="16"/>
  <!-- 5 circles in a row -->
  <circle cx="120" cy="200" r="50" fill="#0f2d2c" opacity="0.08" stroke="#0f2d2c" stroke-width="1"/>
  <circle cx="260" cy="200" r="50" fill="#0f2d2c" opacity="0.08" stroke="#0f2d2c" stroke-width="1"/>
  <circle cx="400" cy="200" r="50" fill="#0f2d2c" opacity="0.08" stroke="#0f2d2c" stroke-width="1"/>
  <circle cx="540" cy="200" r="50" fill="#0f2d2c" opacity="0.08" stroke="#0f2d2c" stroke-width="1"/>
  <circle cx="680" cy="200" r="50" fill="#0f2d2c" opacity="0.08" stroke="#0f2d2c" stroke-width="1"/>
  <!-- Numbers -->
  <text x="120" y="208" text-anchor="middle" font-family="DM Serif Display,serif" font-size="28" fill="#0f2d2c">1</text>
  <text x="260" y="208" text-anchor="middle" font-family="DM Serif Display,serif" font-size="28" fill="#0f2d2c">2</text>
  <text x="400" y="208" text-anchor="middle" font-family="DM Serif Display,serif" font-size="28" fill="#0f2d2c">3</text>
  <text x="540" y="208" text-anchor="middle" font-family="DM Serif Display,serif" font-size="28" fill="#0f2d2c">4</text>
  <text x="680" y="208" text-anchor="middle" font-family="DM Serif Display,serif" font-size="28" fill="#0f2d2c">5</text>
  <!-- Labels -->
  <text x="120" y="275" text-anchor="middle" font-family="DM Sans,sans-serif" font-size="11" fill="#4a6160">Identity</text>
  <text x="120" y="290" text-anchor="middle" font-family="DM Sans,sans-serif" font-size="11" fill="#4a6160">Clarity</text>
  <text x="260" y="275" text-anchor="middle" font-family="DM Sans,sans-serif" font-size="11" fill="#4a6160">Subject</text>
  <text x="260" y="290" text-anchor="middle" font-family="DM Sans,sans-serif" font-size="11" fill="#4a6160">Authority</text>
  <text x="400" y="275" text-anchor="middle" font-family="DM Sans,sans-serif" font-size="11" fill="#4a6160">Meaning</text>
  <text x="400" y="290" text-anchor="middle" font-family="DM Sans,sans-serif" font-size="11" fill="#4a6160">Architecture</text>
  <text x="540" y="275" text-anchor="middle" font-family="DM Sans,sans-serif" font-size="11" fill="#4a6160">Ecosystem</text>
  <text x="540" y="290" text-anchor="middle" font-family="DM Sans,sans-serif" font-size="11" fill="#4a6160">Validation</text>
  <text x="680" y="275" text-anchor="middle" font-family="DM Sans,sans-serif" font-size="11" fill="#4a6160">Signal</text>
  <text x="680" y="290" text-anchor="middle" font-family="DM Sans,sans-serif" font-size="11" fill="#4a6160">Consistency</text>
  <!-- Connecting lines -->
  <line x1="170" y1="200" x2="210" y2="200" stroke="#2bb891" stroke-width="1"/>
  <line x1="310" y1="200" x2="350" y2="200" stroke="#2bb891" stroke-width="1"/>
  <line x1="450" y1="200" x2="490" y2="200" stroke="#2bb891" stroke-width="1"/>
  <line x1="590" y1="200" x2="630" y2="200" stroke="#2bb891" stroke-width="1"/>
  <!-- Title -->
  <text x="400" y="100" text-anchor="middle" font-family="DM Serif Display,serif" font-size="24" fill="#0f2d2c">The Five Signal Model</text>
</svg>
