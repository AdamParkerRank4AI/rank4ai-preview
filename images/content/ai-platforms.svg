<svg xmlns="http://www.w3.org/2000/svg" width="800" height="400" viewBox="0 0 800 400">
  <rect width="800" height="400" fill="#f4f2ed" rx="16"/>
  <!-- Platform boxes -->
  <rect x="60" y="120" width="100" height="60" rx="8" fill="#10a37f" opacity="0.15"/>
  <text x="110" y="156" text-anchor="middle" font-family="DM Sans,sans-serif" font-size="11" fill="#0f2d2c">ChatGPT</text>
  <rect x="200" y="120" width="100" height="60" rx="8" fill="#cc785c" opacity="0.15"/>
  <text x="250" y="156" text-anchor="middle" font-family="DM Sans,sans-serif" font-size="11" fill="#0f2d2c">Claude</text>
  <rect x="340" y="120" width="100" height="60" rx="8" fill="#4285f4" opacity="0.15"/>
  <text x="390" y="156" text-anchor="middle" font-family="DM Sans,sans-serif" font-size="11" fill="#0f2d2c">Gemini</text>
  <rect x="480" y="120" width="100" height="60" rx="8" fill="#1a1a2e" opacity="0.15"/>
  <text x="530" y="156" text-anchor="middle" font-family="DM Sans,sans-serif" font-size="11" fill="#0f2d2c">Perplexity</text>
  <rect x="620" y="120" width="100" height="60" rx="8" fill="#0078d4" opacity="0.15"/>
  <text x="670" y="156" text-anchor="middle" font-family="DM Sans,sans-serif" font-size="11" fill="#0f2d2c">Copilot</text>
  <!-- Center: your business -->
  <rect x="300" y="260" width="200" height="60" rx="8" fill="#0f2d2c" opacity="0.1" stroke="#2bb891" stroke-width="2"/>
  <text x="400" y="296" text-anchor="middle" font-family="DM Sans,sans-serif" font-size="13" fill="#0f2d2c" font-weight="600">Your Business</text>
  <!-- Lines connecting platforms to business -->
  <line x1="110" y1="180" x2="350" y2="260" stroke="#2bb891" stroke-width="1" opacity="0.4"/>
  <line x1="250" y1="180" x2="370" y2="260" stroke="#2bb891" stroke-width="1" opacity="0.4"/>
  <line x1="390" y1="180" x2="400" y2="260" stroke="#2bb891" stroke-width="1" opacity="0.4"/>
  <line x1="530" y1="180" x2="430" y2="260" stroke="#2bb891" stroke-width="1" opacity="0.4"/>
  <line x1="670" y1="180" x2="450" y2="260" stroke="#2bb891" stroke-width="1" opacity="0.4"/>
</svg>
